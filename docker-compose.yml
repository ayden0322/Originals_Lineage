version: '3.8'

services:
  # ---- Backend (NestJS) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: originals-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
      - "9229:9229"
    volumes:
      - ./backend/src:/app/src
      - ./backend/nest-cli.json:/app/nest-cli.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - backend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Taipei
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: originals-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      # 容器內部網路（給 Next.js rewrites 反向代理推廣連結用）
      - INTERNAL_API_URL=http://backend:4000/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - app-network

  # ---- PostgreSQL (Platform DB) ----
  postgres:
    image: postgres:16-alpine
    container_name: originals-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platform_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-platform_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ---- MySQL (Game DB - dev mock) ----
  mysql:
    image: mysql:8.0
    container_name: originals-mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=${GAME_MYSQL_USER:-game_reader}
      - MYSQL_PASSWORD=${GAME_MYSQL_PASSWORD:-game_secret_2026}
      - MYSQL_DATABASE=${GAME_MYSQL_DB:-originals_lineage}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: originals-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ---- MinIO (Object Storage) ----
  minio:
    image: minio/minio:latest
    container_name: originals-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  app-network:
    driver: bridge
